name: Tauri Windows Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  tauri-build:
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Build packaged app
        run: npm run tauri build

      - name: Upload packaged exe
        uses: actions/upload-artifact@v4
        with:
          name: perfi-windows-exe
          path: src-tauri/target/release/perfi.exe
          if-no-files-found: error
